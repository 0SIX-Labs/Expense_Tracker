name: expense_tracker
description: "A beautiful budget & expense tracking app with Liquid Glass design."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.1
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Charts and Visualization
  fl_chart: ^0.66.0
  
  # Date and Time
  intl: ^0.20.2
  
  # UUID Generation
  uuid: ^4.2.1
  
  # File System
  path_provider: ^2.1.1
  
  # Export Functionality
  csv: ^5.1.1
  pdf: ^3.10.7
  share_plus: ^7.2.1
  
  # UI Effects - Liquid Glass
  glassmorphism: ^3.0.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  blur: ^3.1.0
  
  # Icons
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image/my_icon.png"

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/image/
